<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alejito</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #00c6ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      color: #888;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border: 1px solid #333;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Alejito</h1>
    <p>Mi primera página en GitHub. Este es el comienzo de algo grande.</p>
    <span class="badge">✦ En construcción</span>
  </div>
</body>
</html>
